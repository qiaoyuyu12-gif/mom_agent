<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOM 智能问答</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; height: 100vh; display: flex; overflow: hidden; background: #f5f5f5; }

    /* 侧边栏 */
    #sidebar {
      width: 260px; min-width: 260px;
      background: #1a1a2e; color: #eee;
      display: flex; flex-direction: column;
    }
    #sidebar-header { padding: 14px 12px; border-bottom: 1px solid #2e2e4e; }
    #new-chat-btn {
      width: 100%; padding: 9px 12px;
      background: #16213e; border: 1px solid #3a3a5e;
      color: #ddd; border-radius: 6px; cursor: pointer; font-size: 13px;
      text-align: left;
    }
    #new-chat-btn:hover { background: #0f3460; color: #fff; }
    #session-list { flex: 1; overflow-y: auto; padding: 6px; }
    .session-item {
      position: relative; padding: 9px 10px;
      border-radius: 6px; cursor: pointer; margin-bottom: 2px;
    }
    .session-item:hover { background: #2a2a4e; }
    .session-item.active { background: #0f3460; }
    .session-title { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 22px; }
    .session-meta { font-size: 11px; color: #888; margin-top: 2px; }
    .delete-btn {
      display: none; position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
      background: transparent; border: none; color: #f87; cursor: pointer; font-size: 14px; padding: 2px 4px;
    }
    .session-item:hover .delete-btn { display: block; }
    #load-more {
      padding: 8px; text-align: center; font-size: 12px; color: #666; cursor: pointer; display: none;
    }
    #load-more:hover { color: #aaa; }

    /* 聊天区 */
    #chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; background: #fff; }
    #chat-header { padding: 13px 20px; border-bottom: 1px solid #e5e7eb; font-size: 15px; font-weight: 600; color: #111; flex-shrink: 0; }
    #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .msg { max-width: 74%; }
    .msg.user { align-self: flex-end; }
    .msg.assistant { align-self: flex-start; }
    .msg-bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
    .msg.user .msg-bubble { background: #0f3460; color: #fff; border-bottom-right-radius: 2px; }
    .msg.assistant .msg-bubble { background: #f1f5f9; color: #111; border-bottom-left-radius: 2px; }
    .think-block {
      font-size: 12px; color: #888; background: #f8f8f8;
      border-left: 3px solid #ddd; padding: 6px 10px; margin-bottom: 6px;
      border-radius: 4px; cursor: pointer; user-select: none;
    }
    .think-content { display: none; margin-top: 4px; white-space: pre-wrap; color: #666; }
    .think-block.open .think-content { display: block; }

    /* 加载动画 */
    .loading-dots { display: inline-flex; gap: 4px; padding: 2px 0; }
    .loading-dots span {
      width: 6px; height: 6px; border-radius: 50%; background: #94a3b8;
      animation: dot-bounce 1.2s infinite ease-in-out;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot-bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%            { transform: scale(1);   opacity: 1;   }
    }

    /* 输入区 */
    #input-area { padding: 14px 20px; border-top: 1px solid #e5e7eb; background: #fff; flex-shrink: 0; }
    #toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    #skill-tag {
      display: none; align-items: center; gap: 4px;
      background: #e0f2fe; color: #0369a1;
      padding: 2px 8px; border-radius: 4px; font-size: 12px;
    }
    #skill-tag .rm { cursor: pointer; color: #666; margin-left: 2px; }
    #upload-label {
      font-size: 12px; color: #888; cursor: pointer;
      padding: 3px 8px; border: 1px dashed #d1d5db; border-radius: 4px;
    }
    #upload-label:hover { color: #555; }
    #upload-input { display: none; }
    #input-row { display: flex; gap: 8px; align-items: flex-end; }
    #wrap { position: relative; flex: 1; }
    #user-input {
      width: 100%; padding: 9px 12px; border: 1px solid #d1d5db; border-radius: 8px;
      font-size: 14px; font-family: inherit; resize: none; min-height: 40px; max-height: 160px; overflow-y: auto;
    }
    #user-input:focus { outline: none; border-color: #0f3460; }
    #thinking-lbl { display: flex; align-items: center; gap: 4px; font-size: 13px; color: #555; white-space: nowrap; cursor: pointer; }
    #send-btn {
      padding: 9px 20px; background: #0f3460; color: #fff;
      border: none; border-radius: 8px; font-size: 14px; cursor: pointer; white-space: nowrap;
    }
    #send-btn:hover:not(:disabled) { background: #16213e; }
    #send-btn:disabled { opacity: 0.55; cursor: not-allowed; }

    /* Skill 下拉 */
    #skill-dd {
      display: none; position: absolute; bottom: calc(100% + 4px); left: 0;
      background: #fff; border: 1px solid #e5e7eb; border-radius: 8px;
      box-shadow: 0 4px 12px rgba(0,0,0,.1); max-height: 200px; overflow-y: auto; z-index: 100; min-width: 240px;
    }
    .skill-opt { padding: 8px 12px; cursor: pointer; font-size: 13px; }
    .skill-opt:hover { background: #f1f5f9; }
    .skill-opt-name { font-weight: 500; }
    .skill-opt-desc { font-size: 11px; color: #888; margin-top: 1px; }
    /* 步骤展示区域 */
    .step-area { font-size: 12px; margin-bottom: 8px; }
    .step-header {
      display: flex; align-items: center; gap: 5px;
      color: #94a3b8; cursor: pointer; user-select: none; padding: 2px 0;
    }
    .step-header:hover { color: #64748b; }
    .step-toggle-icon { font-size: 10px; }
    .step-list { padding: 4px 0 2px 16px; }
    .step-item {
      display: flex; align-items: flex-start; gap: 6px;
      padding: 2px 0; color: #64748b; line-height: 1.5;
    }
    .step-item.running { color: #0f3460; }
    .step-item.error   { color: #dc2626; }
    .step-icon { min-width: 14px; font-size: 11px; margin-top: 2px; }

  </style>
</head>
<body>

<aside id="sidebar">
  <div id="sidebar-header">
    <button id="new-chat-btn">+ 新对话</button>
  </div>
  <div id="session-list"></div>
  <div id="load-more">加载更多</div>
</aside>

<div id="chat-area">
  <div id="chat-header">MOM 智能问答助手</div>
  <div id="messages"></div>
  <div id="input-area">
    <div id="toolbar">
      <div id="skill-tag">
        <span id="skill-name"></span>
        <span class="rm" onclick="clearSkill()">x</span>
      </div>
      <label id="upload-label" for="upload-input">上传 Skill</label>
      <input id="upload-input" type="file" accept=".md">
    </div>
    <div id="input-row">
      <div id="wrap">
        <textarea id="user-input" rows="1" placeholder="输入消息 (/ 选择 Skill，Shift+Enter 换行)"></textarea>
        <div id="skill-dd"></div>
      </div>
      <label id="thinking-lbl"><input type="checkbox" id="thinking-cb"> 深度思考</label>
      <button id="send-btn">发送</button>
    </div>
  </div>
</div>

<script>
// 状态：存储应用全局状态
const S = {
  userId: null,          // 当前用户ID，持久化到 localStorage
  sessionId: null,       // 当前会话ID，持久化到 localStorage
  skills: [],            // 已加载的 skill 列表
  sessionsOffset: 0,     // 分页偏移量
  sessionsLimit: 20,     // 每页会话数
  hasMore: false,        // 是否还有更多会话
  sending: false,        // 是否正在发送消息（防止重复提交）
  answerEl: null,        // 答案文本写入此元素（answerContentEl）
  loadingEl: null,       // 加载动画 DOM 元素
  bubbleEl: null,        // msg-bubble 元素（错误显示时用）
  thinkWrap: null,       // 当前流式消息的容器 DOM 元素
  stepAreaEl: null,      // 步骤展示区域 DOM 元素
  stepListEl: null,      // 步骤列表 DOM 元素
  abortCtrl: null,       // 当前请求的 AbortController，用于在切换 session 时取消
  firstAnswer: false,    // 是否已收到第一个 answer 事件（用于清除加载动画）
};

// 启动：初始化用户ID和会话ID，加载数据并绑定事件
function init() {
  // 从 localStorage 读取或生成新的用户ID和会话ID
  S.userId    = localStorage.getItem('mom_user_id')    || (localStorage.setItem('mom_user_id',    crypto.randomUUID()), localStorage.getItem('mom_user_id'));
  S.sessionId = localStorage.getItem('mom_session_id') || (localStorage.setItem('mom_session_id', crypto.randomUUID()), localStorage.getItem('mom_session_id'));

  loadSessions();     // 加载历史会话列表
  loadSkills();       // 加载可用 skill 列表
  setupInputEvents(); // 绑定输入框事件

  document.getElementById('new-chat-btn').addEventListener('click', startNewChat);
  document.getElementById('load-more').addEventListener('click', function() { loadSessions(false); });
  document.getElementById('send-btn').addEventListener('click', sendMessage);
  document.getElementById('upload-input').addEventListener('change', uploadSkill);
}

// 从后端加载会话列表（reset=true 时重置列表，false 时追加）
async function loadSessions(reset) {
  if (reset === undefined) reset = true;
  const prevOffset = S.sessionsOffset; // 保存当前 offset，失败时恢复
  if (reset) { S.sessionsOffset = 0; }
  var url = '/history/sessions?user_id=' + enc(S.userId) + '&limit=' + S.sessionsLimit + '&offset=' + S.sessionsOffset;
  const res = await fetch(url);
  if (!res.ok) {
    S.sessionsOffset = prevOffset; // 恢复，避免状态错乱
    return;
  }
  const data = await res.json();
  if (reset) {
    renderSidebar(data);
  } else {
    appendSidebar(data);
  }
  S.sessionsOffset += data.length;
  S.hasMore = data.length === S.sessionsLimit;
  document.getElementById('load-more').style.display = S.hasMore ? 'block' : 'none';
}

// 重新渲染整个侧边栏会话列表
function renderSidebar(sessions) {
  const list = document.getElementById('session-list');
  list.innerHTML = '';
  sessions.forEach(function(s) { list.appendChild(makeSessionItem(s)); });
}

// 向侧边栏追加更多会话（分页加载）
function appendSidebar(sessions) {
  const list = document.getElementById('session-list');
  sessions.forEach(function(s) { list.appendChild(makeSessionItem(s)); });
}

// 创建单个会话列表项 DOM 元素
function makeSessionItem(s) {
  const div = document.createElement('div');
  div.className = 'session-item' + (s.session_id === S.sessionId ? ' active' : '');
  div.dataset.sid = s.session_id;
  div.innerHTML =
    '<div class="session-title">' + esc(s.title) + '</div>' +
    '<div class="session-meta">' + relTime(s.updated_at) + ' - ' + esc(String(s.message_count)) + ' 条</div>' +
    '<button class="delete-btn" title="删除此对话">X</button>';
  div.addEventListener('click', function(e) {
    if (!e.target.closest('.delete-btn')) switchSession(s.session_id);
  });
  div.querySelector('.delete-btn').addEventListener('click', function(e) {
    e.stopPropagation();
    confirmDelete(s.session_id);
  });
  return div;
}

// 高亮当前活跃会话
function highlightSession(sid) {
  document.querySelectorAll('.session-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.sid === sid);
  });
}

// 切换到指定会话，加载该会话的历史消息
async function switchSession(sessionId) {
  if (sessionId === S.sessionId) return;

  // 若有正在进行的请求，先中断它，避免 SSE 事件更新已脱离 DOM 的元素
  if (S.sending && S.abortCtrl) {
    S.abortCtrl.abort();
    // abortCtrl.abort() 会让 fetch 抛出 AbortError，
    // sendMessage 的 catch/finally 会负责清理 S.sending / S.answerEl
  }

  S.sessionId = sessionId;
  localStorage.setItem('mom_session_id', sessionId);
  highlightSession(sessionId);

  const res = await fetch('/history/sessions/' + sessionId + '/messages?user_id=' + enc(S.userId));
  if (!res.ok) return;
  const msgs = await res.json();

  const container = document.getElementById('messages');
  container.innerHTML = '';
  msgs.forEach(function(m) { appendBubble(m.role, m.content, m.thinking); });
  scrollToBottom();
}

// 新建对话：生成新会话ID，清空消息区，刷新侧边栏
function startNewChat() {
  // 若有正在进行的请求，先中断
  if (S.sending && S.abortCtrl) S.abortCtrl.abort();
  S.sessionId = crypto.randomUUID();
  localStorage.setItem('mom_session_id', S.sessionId);
  document.getElementById('messages').innerHTML = '';
  loadSessions();
}

// 确认并删除指定会话
async function confirmDelete(sessionId) {
  if (!confirm('确认删除这条对话？')) return;
  const res = await fetch('/history/sessions/' + sessionId + '?user_id=' + enc(S.userId), { method: 'DELETE' });
  if (!res.ok) { alert('删除失败'); return; }
  if (sessionId === S.sessionId) {
    startNewChat(); // startNewChat 内部已调用 loadSessions()
  } else {
    loadSessions();
  }
}

// 添加静态消息气泡（用于加载历史消息）
function appendBubble(role, content, thinking) {
  const container = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;

  // 如果有思考过程，添加可折叠的思考块
  if (thinking) {
    const think = document.createElement('div');
    think.className = 'think-block';
    think.innerHTML = '思考过程 <div class="think-content">' + esc(thinking) + '</div>';
    think.addEventListener('click', function() { think.classList.toggle('open'); });
    wrap.appendChild(think);
  }

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = content;
  wrap.appendChild(bubble);
  container.appendChild(wrap);
  scrollToBottom();
  return bubble;
}

// 创建流式回答的气泡（含步骤区域 + 加载动画 + 答案区域）
function startStreamBubble() {
  const container = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg assistant';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  // 步骤展示区域（初始隐藏，首个 status 事件到达时显示）
  const stepArea = document.createElement('div');
  stepArea.className = 'step-area';
  stepArea.style.display = 'none';

  const stepHeader = document.createElement('div');
  stepHeader.className = 'step-header';
  stepHeader.innerHTML = '<span class="step-toggle-icon">▼</span> 执行过程';
  stepHeader.addEventListener('click', function() {
    const list = stepArea.querySelector('.step-list');
    const icon = stepArea.querySelector('.step-toggle-icon');
    if (!list) return;
    const collapsed = list.style.display === 'none';
    list.style.display = collapsed ? '' : 'none';
    icon.textContent = collapsed ? '▼' : '▶';
  });

  const stepList = document.createElement('div');
  stepList.className = 'step-list';
  stepArea.appendChild(stepHeader);
  stepArea.appendChild(stepList);
  bubble.appendChild(stepArea);

  // 加载动画（等待首个事件到达前显示）
  const loadingEl = document.createElement('div');
  loadingEl.className = 'loading-dots';
  loadingEl.innerHTML = '<span></span><span></span><span></span>';
  bubble.appendChild(loadingEl);

  // 答案文本容器（独立 div，避免 textContent 清除步骤区子元素）
  const answerContentEl = document.createElement('div');
  answerContentEl.style.display = 'none';
  bubble.appendChild(answerContentEl);

  wrap.appendChild(bubble);
  container.appendChild(wrap);

  S.answerEl        = answerContentEl;   // 流式回答写入此元素
  S.loadingEl       = loadingEl;
  S.stepAreaEl      = stepArea;
  S.stepListEl      = stepList;
  S.bubbleEl        = bubble;            // 错误信息时直接写 bubble
  S.thinkWrap       = wrap;
  S.firstAnswer     = false;
  scrollToBottom();
}

// 滚动聊天区域到最底部
function scrollToBottom() {
  const c = document.getElementById('messages');
  c.scrollTop = c.scrollHeight;
}

// 处理后端 status 事件：在步骤列表中新增或更新对应步骤
function handleStatus(d) {
  if (!S.stepListEl || !S.stepAreaEl) return;
  const stage   = d.stage  || '';
  const label   = d.label  || stage;
  const isStart = stage.endsWith('_start');
  // baseStage 统一 _start/_done/_load 为同一条目
  const baseStage = stage.replace(/_start$/, '').replace(/_done$/, '').replace(/_load$/, '');
  const ok  = d.ok !== false;
  const cls  = isStart ? 'running' : (ok ? 'done' : 'error');
  const icon = isStart ? '◌'       : (ok ? '✓'   : '✗');

  // 首个 status 到达：显示步骤区，展开列表，隐藏加载动画
  if (S.stepAreaEl.style.display === 'none') {
    S.stepAreaEl.style.display = '';
    S.stepListEl.style.display = '';
    if (S.loadingEl) S.loadingEl.style.display = 'none';
  }

  // 更新已存在的同类步骤，否则追加新步骤
  const existing = S.stepListEl.querySelector('[data-base="' + baseStage + '"]');
  if (existing) {
    existing.className = 'step-item ' + cls;
    existing.querySelector('.step-icon').textContent = icon;
    existing.querySelector('.step-label').textContent = label;
  } else {
    const item = document.createElement('div');
    item.className = 'step-item ' + cls;
    item.dataset.base = baseStage;
    item.innerHTML =
      '<span class="step-icon">' + icon + '</span>' +
      '<span class="step-label">' + esc(label) + '</span>';
    S.stepListEl.appendChild(item);
  }
  scrollToBottom();
}

// 发送消息 + SSE 流式接收
async function sendMessage() {
  if (S.sending) return; // 防止重复发送
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  const thinking = document.getElementById('thinking-cb').checked;
  const skillEl  = document.getElementById('skill-name');
  const skill    = skillEl.textContent.trim() || null;

  input.value = '';
  input.style.height = 'auto';
  S.sending = true;
  document.getElementById('send-btn').disabled = true;
  S.abortCtrl = new AbortController();

  appendBubble('user', text);   // 立即显示用户消息
  startStreamBubble();           // 创建带加载动画的助手回复气泡

  var thinkBuf = '';    // 思考过程缓冲
  var answerBuf = '';   // 回答内容缓冲
  var thinkDiv = null;  // 思考块 DOM 元素（按需创建）

  try {
    // 向后端发起 POST /chat 请求，接收 SSE 流
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: S.sessionId, user_id: S.userId, message: text, skill: skill, thinking: thinking }),
      signal: S.abortCtrl.signal,   // 绑定 AbortController，支持切换 session 时取消
    });

    // 检查 HTTP 状态码，非 2xx 时提前退出并显示错误
    if (!res.ok) {
      const errText = await res.text().catch(() => '');
      const el = S.bubbleEl || S.answerEl;
      if (el) el.textContent = '[请求失败 ' + res.status + '] ' + errText;
      return;
    }

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    var buf = '';

    // 逐块读取 SSE 流数据
    while (true) {
      const chunk = await reader.read();
      if (chunk.done) break;
      buf += decoder.decode(chunk.value, { stream: true }).replace(/\r\n/g, '\n').replace(/\r/g, '\n');
      // 按双换行分割 SSE 事件块
      const parts = buf.split('\n\n');
      buf = parts.pop(); // 保留未完成的数据

      for (var i = 0; i < parts.length; i++) {
        // 解析 SSE 事件类型和数据（支持多行 data 字段正确拼接）
        var event = 'message';
        var dataLines = [];
        const lines = parts[i].split('\n');
        for (var j = 0; j < lines.length; j++) {
          if (lines[j].startsWith('event: ')) event = lines[j].slice(7).trim();
          else if (lines[j].startsWith('data: ')) dataLines.push(lines[j].slice(6));
        }
        var data = dataLines.join('\n');

        if (event === 'thought') {
          // 收到思考过程片段，追加到思考块
          thinkBuf += data;
          if (!thinkDiv) {
            thinkDiv = document.createElement('div');
            thinkDiv.className = 'think-block';
            thinkDiv.innerHTML = '思考过程 <div class="think-content"></div>';
            thinkDiv.addEventListener('click', function() { thinkDiv.classList.toggle('open'); });
            if (S.thinkWrap && S.bubbleEl) S.thinkWrap.insertBefore(thinkDiv, S.bubbleEl);
          }
          if (thinkDiv) thinkDiv.querySelector('.think-content').textContent = thinkBuf;
        } else if (event === 'answer') {
          // 收到第一个 answer 事件时：隐藏加载动画，折叠步骤区，显示答案区
          if (!S.firstAnswer) {
            S.firstAnswer = true;
            if (S.loadingEl) S.loadingEl.style.display = 'none';
            if (S.answerEl) S.answerEl.style.display = '';     // 显示答案 div
            if (S.stepAreaEl && S.stepAreaEl.style.display !== 'none') {
              S.stepListEl.style.display = 'none';              // 折叠步骤列表
              const icon = S.stepAreaEl.querySelector('.step-toggle-icon');
              if (icon) icon.textContent = '▶';
            }
          }
          // 追加答案内容（直接 textContent，不影响步骤区）
          answerBuf += data;
          if (S.answerEl) {
            S.answerEl.textContent = answerBuf;
            scrollToBottom();
          }
        } else if (event === 'status') {
          // 收到步骤状态事件，更新步骤展示区域
          try { handleStatus(JSON.parse(data)); } catch(ex) {}
        } else if (event === 'error') {
          // 收到错误事件，显示在 bubble 级别（会清除所有子元素）
          const el = S.bubbleEl || S.answerEl;
          if (el) {
            try { el.textContent = '[错误] ' + JSON.parse(data).error; }
            catch(ex) { el.textContent = '[错误] ' + data; }
          }
        }
      }
    }
  } catch (e) {
    // AbortError 是用户主动切换 session 触发的，不显示错误
    if (e.name !== 'AbortError') {
      const el = S.bubbleEl || S.answerEl;
      if (el) el.textContent = '[网络错误] ' + e.message;
    }
  } finally {
    S.sending        = false;
    S.abortCtrl      = null;
    document.getElementById('send-btn').disabled = false;
    S.answerEl       = null;
    S.loadingEl      = null;
    S.bubbleEl       = null;
    S.thinkWrap      = null;
    S.stepAreaEl     = null;
    S.stepListEl     = null;
    loadSessions();
  }
}

// 从后端加载可用 skill 列表
async function loadSkills() {
  const res = await fetch('/skills');
  if (res.ok) S.skills = await res.json();
}

// 绑定输入框相关事件（自动高度、skill 下拉、回车发送）
function setupInputEvents() {
  const input = document.getElementById('user-input');
  const dd    = document.getElementById('skill-dd');

  input.addEventListener('input', function() {
    // 动态调整文本框高度
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';

    const val = input.value;
    if (val.startsWith('/')) {
      // 输入 / 时过滤 skill 列表并显示下拉
      const q = val.slice(1).toLowerCase();
      const hits = S.skills.filter(function(s) {
        return s.name.toLowerCase().includes(q) || s.description.toLowerCase().includes(q);
      });
      if (hits.length) {
        dd.innerHTML = hits.map(function(s) {
          return '<div class="skill-opt" data-name="' + escAttr(s.name) + '">' +
            '<div class="skill-opt-name">/' + esc(s.name) + '</div>' +
            '<div class="skill-opt-desc">' + esc(s.description) + '</div>' +
            '</div>';
        }).join('');
        dd.querySelectorAll('.skill-opt').forEach(function(el) {
          el.addEventListener('click', function() { selectSkill(el.dataset.name); });
        });
        dd.style.display = 'block';
      } else {
        dd.style.display = 'none';
      }
    } else {
      dd.style.display = 'none';
    }
  });

  // Enter 发送，Shift+Enter 换行
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // 点击输入框外部时关闭 skill 下拉
  document.addEventListener('click', function(e) {
    if (!e.target.closest('#wrap')) dd.style.display = 'none';
  });
}

// 选中某个 skill，显示 skill 标签，清空输入框
function selectSkill(name) {
  document.getElementById('user-input').value = '';
  document.getElementById('skill-dd').style.display = 'none';
  document.getElementById('skill-name').textContent = name;
  document.getElementById('skill-tag').style.display = 'flex';
}

// 清除已选 skill 标签
function clearSkill() {
  document.getElementById('skill-tag').style.display = 'none';
  document.getElementById('skill-name').textContent = '';
}

// 上传 .md 文件到后端
async function uploadSkill(e) {
  const file = e.target.files[0];
  if (!file) return;
  const form = new FormData();
  form.append('file', file);
  const res = await fetch('/skills/upload', { method: 'POST', body: form });
  if (res.ok) {
    alert('Skill 上传成功');
    loadSkills(); // 刷新 skill 列表
  } else {
    const err = await res.json().catch(function() { return {}; });
    alert('上传失败: ' + (err.detail || '未知错误'));
  }
  e.target.value = ''; // 清空文件选择，允许重复上传同名文件
}

// HTML 转义，防止 XSS
function esc(s)     { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
// 属性值转义
function escAttr(s) { return String(s).replace(/"/g,'&quot;'); }
// URL 编码
function enc(s)     { return encodeURIComponent(s); }
// 将 ISO 时间戳转换为相对时间描述
function relTime(iso) {
  const d = (Date.now() - new Date(iso)) / 1000;
  if (d < 60)    return '刚刚';
  if (d < 3600)  return Math.floor(d / 60)   + ' 分钟前';
  if (d < 86400) return Math.floor(d / 3600) + ' 小时前';
  return Math.floor(d / 86400) + ' 天前';
}

// 页面加载完成后启动应用
init();
</script>
