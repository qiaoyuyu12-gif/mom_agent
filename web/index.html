<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mom_agent · 知识库助手</title>
  <style>
    /* ============== 基础布局 ============== */
    :root {
      --bg: #f7f7f8;
      --panel: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --user: #dbeafe;
      --assistant: #ffffff;
      --think: #fef3c7;
      --accent: #2563eb;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 12px 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    header h1 { font-size: 16px; margin: 0; }
    header .meta { font-size: 12px; color: var(--muted); }
    header .controls { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    header .controls label { font-size: 13px; display: flex; align-items: center; gap: 6px; }
    header button {
      padding: 6px 12px;
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    header button:hover { background: #f3f4f6; }

    /* ============== 消息流 ============== */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg { max-width: 78%; padding: 10px 14px; border-radius: 10px; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; }
    .msg.user { background: var(--user); align-self: flex-end; }
    .msg.assistant { background: var(--assistant); align-self: flex-start; border: 1px solid var(--border); }
    .msg .role { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .think {
      background: var(--think);
      border-left: 3px solid #f59e0b;
      padding: 8px 10px;
      margin: 6px 0;
      border-radius: 6px;
      font-size: 13px;
      color: #6b4f00;
      white-space: pre-wrap;
    }
    .think summary { cursor: pointer; font-weight: 600; }
    .sources { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .sources span { display: inline-block; background: #eef2ff; color: #3730a3; border-radius: 999px; padding: 1px 8px; margin-right: 4px; }
    .meta-line { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* ============== 输入区 ============== */
    #composer {
      border-top: 1px solid var(--border);
      background: var(--panel);
      padding: 10px 16px;
      position: relative;
    }
    #skill-badge {
      display: none;
      background: #ecfdf5;
      color: #047857;
      border: 1px solid #a7f3d0;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 12px;
      margin-bottom: 6px;
      align-self: flex-start;
    }
    #skill-badge button { background: none; border: 0; cursor: pointer; color: #047857; margin-left: 6px; }
    #composer-toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; justify-content: flex-end; }
    #composer-toolbar .thinking-label { font-size: 13px; display: flex; align-items: center; gap: 6px; cursor: pointer; }
    #composer-toolbar button {
      padding: 5px 10px;
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    #composer-toolbar button:hover { background: #f3f4f6; }
    #input-row { display: flex; gap: 8px; align-items: flex-end; }
    #input {
      flex: 1;
      min-height: 44px;
      max-height: 200px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font: inherit;
      resize: none;
      outline: none;
    }
    #input:focus { border-color: var(--accent); }
    #send {
      padding: 10px 18px;
      background: var(--accent);
      color: white;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
    }
    #send:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ============== Skill 下拉 ============== */
    #skill-pop {
      position: absolute;
      bottom: 64px;
      left: 16px;
      right: 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      max-height: 240px;
      overflow-y: auto;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      display: none;
    }
    .skill-item { padding: 8px 12px; cursor: pointer; }
    .skill-item:hover, .skill-item.active { background: #eef2ff; }
    .skill-item .name { font-weight: 600; font-size: 13px; }
    .skill-item .desc { font-size: 12px; color: var(--muted); }

    /* ============== 历史聊天记录抽屉 ============== */
    #history-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      display: none;
      z-index: 20;
    }
    #history-drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: min(440px, 92vw);
      height: 100%;
      background: var(--panel);
      border-left: 1px solid var(--border);
      box-shadow: -8px 0 24px rgba(0,0,0,0.08);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 21;
      display: flex;
      flex-direction: column;
    }
    #history-drawer.open { transform: translateX(0); }
    #history-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    #history-close { background: none; border: 0; font-size: 20px; line-height: 1; cursor: pointer; color: var(--muted); }
    .history-actions { display: flex; align-items: center; gap: 8px; }
    #history-newchat {
      background: var(--accent);
      border: 0;
      color: #fff;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 13px;
      cursor: pointer;
    }
    #history-newchat:hover { opacity: 0.92; }
    #history-body { flex: 1; overflow-y: auto; padding: 8px; }

    /* —— 会话列表 —— */
    .sess-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 10px;
      border-radius: 8px;
      cursor: pointer;
    }
    .sess-item:hover { background: #f3f4f6; }
    .sess-item.active { background: #eef2ff; }
    .sess-main { flex: 1; min-width: 0; }
    .sess-title {
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sess-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .sess-del {
      background: none;
      border: 0;
      color: #b91c1c;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 6px;
      opacity: 0;
    }
    .sess-item:hover .sess-del { opacity: 1; }
    .sess-del:hover { background: #fef2f2; }
    .hist-empty, .hist-loading { color: var(--muted); font-size: 13px; padding: 12px 8px; }
  </style>
</head>
<body>
  <header>
    <h1>mom_agent · 知识库助手</h1>
    <div class="meta">session: <span id="sid"></span></div>
    <div class="controls">
      <button id="history-btn" title="查看历史会话">会话</button>
    </div>
  </header>

  <div id="messages"></div>

  <div id="skill-pop"></div>

  <div id="composer">
    <div id="skill-badge"><span id="skill-badge-name"></span><button id="skill-badge-clear">×</button></div>
    <div id="composer-toolbar">
      <label class="thinking-label"><input type="checkbox" id="thinking-toggle" /> 深度思考</label>
      <button id="upload-skill-btn" type="button">上传 Skill</button>
      <input type="file" id="skill-file" webkitdirectory directory multiple style="display:none" />
    </div>
    <div id="input-row">
      <textarea id="input" placeholder="输入消息;输入 / 选择 skill。Enter 发送,Shift+Enter 换行"></textarea>
      <button id="send">发送</button>
    </div>
  </div>

  <!-- 历史会话抽屉(按 session 分组) -->
  <div id="history-overlay"></div>
  <aside id="history-drawer">
    <div id="history-head">
      <strong>历史会话</strong>
      <div class="history-actions">
        <button id="history-newchat" title="新开一个对话">+ 新对话</button>
        <button id="history-close" title="关闭">×</button>
      </div>
    </div>
    <div id="history-body"></div>
  </aside>

<script>
/* =========================================================
 * 工具与状态
 * ========================================================= */
const $ = (sel) => document.querySelector(sel);
const messagesEl = $("#messages");
const inputEl    = $("#input");
const sendBtn    = $("#send");
const thinkingCb = $("#thinking-toggle");
const popEl      = $("#skill-pop");
const badgeEl    = $("#skill-badge");
const badgeName  = $("#skill-badge-name");
const badgeClear = $("#skill-badge-clear");
const fileInput  = $("#skill-file");
const historyBtn   = $("#history-btn");
const historyDrawer= $("#history-drawer");
const historyOverlay = $("#history-overlay");
const historyClose = $("#history-close");
const historyNewBtn= $("#history-newchat");
const historyBody  = $("#history-body");

// session_id 持久化(刷新页面保留对话)
function genUuid() {
  // crypto.randomUUID 仅在安全上下文(HTTPS / localhost)可用;
  // 走 0.0.0.0 或局域网 IP 访问时降级为 RFC4122 v4 手工生成,避免脚本初始化整体崩掉。
  return (window.crypto && crypto.randomUUID)
    ? crypto.randomUUID()
    : "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        return (c === "x" ? r : (r & 0x3) | 0x8).toString(16);
      });
}

let sessionId = localStorage.getItem("mom_session_id");
if (!sessionId) {
  sessionId = genUuid();
  localStorage.setItem("mom_session_id", sessionId);
}
$("#sid").textContent = sessionId.slice(0, 8);

// 稳定的浏览器级 user_id:用于把同一浏览器下创建的会话归到一起(无登录体系时的轻量标识)
let userId = localStorage.getItem("mom_user_id");
if (!userId) {
  userId = genUuid();
  localStorage.setItem("mom_user_id", userId);
}

// 当前已选中 skill
let currentSkill = null;
function setSkill(name) {
  currentSkill = name;
  if (name) {
    badgeEl.style.display = "inline-block";
    badgeName.textContent = "/" + name;
  } else {
    badgeEl.style.display = "none";
  }
}
badgeClear.onclick = () => setSkill(null);

/* =========================================================
 * 消息渲染
 * ========================================================= */
function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

function addUserMessage(text) {
  const div = document.createElement("div");
  div.className = "msg user";
  div.innerHTML = `<div class="role">你</div>`;
  const body = document.createElement("div");
  body.textContent = text;
  div.appendChild(body);
  messagesEl.appendChild(div);
  scrollBottom();
}

function addAssistantBubble() {
  const div = document.createElement("div");
  div.className = "msg assistant";
  div.innerHTML = `<div class="role">助手</div>`;

  const think = document.createElement("details");
  think.className = "think";
  think.style.display = "none";
  think.innerHTML = `<summary>思考过程</summary><div class="think-body"></div>`;

  const ans = document.createElement("div");
  ans.className = "ans-body";

  const sources = document.createElement("div");
  sources.className = "sources";
  sources.style.display = "none";

  const meta = document.createElement("div");
  meta.className = "meta-line";

  div.appendChild(think);
  div.appendChild(ans);
  div.appendChild(sources);
  div.appendChild(meta);
  messagesEl.appendChild(div);
  scrollBottom();

  return {
    appendThought: (s) => {
      think.style.display = "block";
      think.querySelector(".think-body").textContent += s;
      scrollBottom();
    },
    appendAnswer: (s) => { ans.textContent += s; scrollBottom(); },
    setMeta: (info) => {
      if (info.sources && info.sources.length) {
        sources.style.display = "block";
        sources.innerHTML = "来源:" + info.sources
          .map((s) => `<span>[${s.idx}] ${s.doc_name} (${s.similarity.toFixed(2)})</span>`)
          .join("");
      }
      const bits = [];
      if (info.compression_triggered) bits.push("已触发上下文压缩");
      bits.push(`窗口 ${info.tokens_before}→${info.tokens_after} tokens`);
      if (info.thinking) bits.push("深度思考");
      if (info.skill) bits.push(`skill=${info.skill}`);
      meta.textContent = bits.join(" · ");
    },
  };
}

/* =========================================================
 * SSE:用 fetch 读取流式响应(EventSource 不支持 POST body)
 * ========================================================= */
async function streamChat(text) {
  const body = {
    session_id: sessionId,
    message: text,
    user_id: userId,
    skill: currentSkill || null,
    thinking: thinkingCb.checked,
  };

  const resp = await fetch("/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  if (!resp.ok || !resp.body) {
    addAssistantBubble().appendAnswer(`[错误] HTTP ${resp.status}`);
    return;
  }

  const bubble = addAssistantBubble();
  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buf = "";

  // SSE 帧由空行分隔;每帧含若干 "event:" 与 "data:" 行
  while (true) {
    const { value, done } = await reader.read();
    if (done) break;
    // sse-starlette 用 CRLF;把 \r\n 归一为 \n,后面才能按 \n\n 切帧
    buf += decoder.decode(value, { stream: true }).replace(/\r\n/g, "\n");
    let idx;
    while ((idx = buf.indexOf("\n\n")) !== -1) {
      const frame = buf.slice(0, idx);
      buf = buf.slice(idx + 2);
      handleFrame(frame, bubble);
    }
  }
}

function handleFrame(frame, bubble) {
  let event = "message";
  const dataLines = [];
  for (const line of frame.split("\n")) {
    if (line.startsWith("event:")) event = line.slice(6).trim();
    else if (line.startsWith("data:")) dataLines.push(line.slice(5).trimStart());
  }
  const data = dataLines.join("\n");
  if (!data) return;

  switch (event) {
    case "meta":     try { bubble.setMeta(JSON.parse(data)); } catch (_) {} break;
    case "thought":  bubble.appendThought(data); break;
    case "answer":   bubble.appendAnswer(data); break;
    case "done":     break;
    case "error":    bubble.appendAnswer(`\n[错误] ${data}`); break;
  }
}

/* =========================================================
 * Skill `/` 自动补全
 * ========================================================= */
let cachedSkills = [];
async function fetchSkills() {
  try {
    const r = await fetch("/skills");
    cachedSkills = await r.json();
  } catch (_) { cachedSkills = []; }
}

function renderPop(items, query) {
  if (!items.length) { popEl.style.display = "none"; return; }
  popEl.innerHTML = items.map((s, i) =>
    `<div class="skill-item ${i===0?"active":""}" data-name="${s.name}">
      <div class="name">/${s.name}</div>
      <div class="desc">${s.description||""}</div>
    </div>`
  ).join("");
  popEl.style.display = "block";
  popEl.querySelectorAll(".skill-item").forEach(el => {
    el.onclick = () => pickSkill(el.dataset.name);
  });
}

function pickSkill(name) {
  setSkill(name);
  // 从输入框中删掉触发的 "/xxx" 串
  const v = inputEl.value;
  const lastSlash = v.lastIndexOf("/");
  if (lastSlash !== -1) {
    inputEl.value = v.slice(0, lastSlash);
  }
  popEl.style.display = "none";
  inputEl.focus();
}

function updateSkillPop() {
  const v = inputEl.value;
  const m = v.match(/(?:^|\s)\/([^\s/]*)$/);  // 行首或空格后的 / + 后续非空
  if (!m) { popEl.style.display = "none"; return; }
  const q = m[1].toLowerCase();
  const items = (cachedSkills || []).filter(s =>
    s.name.toLowerCase().includes(q) || (s.description||"").toLowerCase().includes(q)
  ).slice(0, 8);
  renderPop(items, q);
}

inputEl.addEventListener("input", updateSkillPop);
inputEl.addEventListener("keydown", (e) => {
  // 弹层打开 + Enter:选中第一个
  if (popEl.style.display === "block" && e.key === "Enter" && !e.shiftKey) {
    const first = popEl.querySelector(".skill-item.active");
    if (first) { e.preventDefault(); pickSkill(first.dataset.name); return; }
  }
  if (e.key === "Escape") { popEl.style.display = "none"; }
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    submit();
  }
});

/* =========================================================
 * 上传 Skill:选择一个 skill 文件夹(渐进式披露)
 * 文件夹须含入口 md(SKILL.md 优先;或文件夹内唯一的 .md),
 * 入口 md 的 frontmatter 须含 name / description。
 * ========================================================= */

// 以 "files" 字段提交;用 webkitRelativePath 保留目录结构
async function uploadSkillFiles(fileList) {
  const fd = new FormData();
  let n = 0;
  for (const f of fileList) {
    // 跳过隐藏文件(.DS_Store / .git 等)
    const rel = f.webkitRelativePath || f.name;
    if (rel.split("/").some(seg => seg.startsWith("."))) continue;
    fd.append("files", f, rel);
    n++;
  }
  if (!n) { alert("没有可上传的文件"); return; }
  try {
    const r = await fetch("/skills/upload", { method: "POST", body: fd });
    if (r.ok) {
      const s = await r.json();
      alert(`已上传 skill:${s.name}`);
      await fetchSkills();
    } else {
      let msg = `HTTP ${r.status}`;
      try { msg = (await r.json()).detail || msg; } catch (_) {}
      alert(`上传失败:${msg}`);
    }
  } catch (e) {
    alert(`上传失败:${e.message}`);
  }
}

$("#upload-skill-btn").onclick = () => fileInput.click();
fileInput.onchange = async () => {
  if (fileInput.files.length) await uploadSkillFiles(fileInput.files);
  fileInput.value = "";
};

/* =========================================================
 * 提交
 * ========================================================= */
async function submit() {
  const text = inputEl.value.trim();
  if (!text) return;
  sendBtn.disabled = true;
  inputEl.value = "";
  addUserMessage(text);
  try {
    await streamChat(text);
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}
sendBtn.onclick = submit;

/* =========================================================
 * 历史会话(按 session 分组)抽屉
 * ========================================================= */

// 把一段归档消息渲染进主对话区(静态,不可流式追加)
function renderArchivedMessages(items) {
  messagesEl.innerHTML = "";
  for (const m of items) {
    if (m.role === "user") {
      addUserMessage(m.content || "");
      continue;
    }
    // assistant:静态气泡(可选思考过程折叠 + 正文)
    const div = document.createElement("div");
    div.className = "msg assistant";
    div.innerHTML = `<div class="role">助手</div>`;
    if (m.thinking) {
      const think = document.createElement("details");
      think.className = "think";
      think.innerHTML = `<summary>思考过程</summary><div class="think-body"></div>`;
      think.querySelector(".think-body").textContent = m.thinking;
      div.appendChild(think);
    }
    const ans = document.createElement("div");
    ans.className = "ans-body";
    ans.textContent = m.content || "";
    div.appendChild(ans);
    messagesEl.appendChild(div);
  }
  scrollBottom();
}

// 渲染会话列表
function renderSessionList(sessions) {
  historyBody.innerHTML = "";
  if (!sessions.length) {
    const e = document.createElement("div");
    e.className = "hist-empty";
    e.textContent = "暂无历史会话。点「+ 新对话」开始。";
    historyBody.appendChild(e);
    return;
  }
  for (const s of sessions) {
    const item = document.createElement("div");
    item.className = "sess-item" + (s.session_id === sessionId ? " active" : "");

    const main = document.createElement("div");
    main.className = "sess-main";
    const title = document.createElement("div");
    title.className = "sess-title";
    title.textContent = s.title || "(无标题)";
    const meta = document.createElement("div");
    meta.className = "sess-meta";
    meta.textContent = `${s.message_count} 条 · ${fmtTime(s.updated_at)}`;
    main.appendChild(title);
    main.appendChild(meta);
    main.onclick = () => switchSession(s.session_id);
    item.appendChild(main);

    const del = document.createElement("button");
    del.className = "sess-del";
    del.title = "删除该会话";
    del.textContent = "🗑";
    del.onclick = (e) => { e.stopPropagation(); deleteSession(s.session_id); };
    item.appendChild(del);

    historyBody.appendChild(item);
  }
}

function fmtTime(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d)) return "";
  const pad = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

async function loadSessions() {
  historyBody.innerHTML = `<div class="hist-loading">加载中…</div>`;
  try {
    const r = await fetch(`/sessions?user_id=${encodeURIComponent(userId)}`);
    if (!r.ok) throw new Error("HTTP " + r.status);
    renderSessionList(await r.json());
  } catch (e) {
    historyBody.innerHTML = `<div class="hist-empty">加载失败:${e.message}</div>`;
  }
}

function openHistory() {
  historyDrawer.classList.add("open");
  historyOverlay.style.display = "block";
  loadSessions();
}

function closeHistory() {
  historyDrawer.classList.remove("open");
  historyOverlay.style.display = "none";
}

// 切换到某个历史会话:把它设为当前 session 并把消息载入主对话区
async function switchSession(sid) {
  if (sid !== sessionId) {
    sessionId = sid;
    localStorage.setItem("mom_session_id", sessionId);
    $("#sid").textContent = sessionId.slice(0, 8);
  }
  setSkill(null);
  messagesEl.innerHTML = `<div class="hist-loading">加载会话中…</div>`;
  try {
    const r = await fetch(`/sessions/${encodeURIComponent(sid)}/messages`);
    if (!r.ok) throw new Error("HTTP " + r.status);
    renderArchivedMessages(await r.json());
  } catch (e) {
    messagesEl.innerHTML = `<div class="hist-empty">加载失败:${e.message}</div>`;
  }
  closeHistory();
  inputEl.focus();
}

// 删除某个历史会话(归档 + 摘要 + Redis 短期窗口)
async function deleteSession(sid) {
  if (!confirm("确定删除该会话的全部聊天记录?此操作不可恢复。")) return;
  try {
    const r = await fetch(`/sessions/${encodeURIComponent(sid)}/messages`, { method: "DELETE" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    // 删的是当前会话 → 顺手开一段新对话
    if (sid === sessionId) newChat({ keepDrawerOpen: true });
    await loadSessions();
  } catch (e) {
    alert("删除失败:" + e.message);
  }
}

historyBtn.onclick = openHistory;
historyClose.onclick = closeHistory;
historyOverlay.onclick = closeHistory;
historyNewBtn.onclick = () => newChat({ keepDrawerOpen: true });

/* =========================================================
 * 新对话:生成新的 session_id,开一段全新对话记录
 * ========================================================= */
function newChat(opts = {}) {
  sessionId = genUuid();
  localStorage.setItem("mom_session_id", sessionId);
  $("#sid").textContent = sessionId.slice(0, 8);
  messagesEl.innerHTML = "";   // 清空当前页面对话区(旧会话已归档在 PG,可从历史会话切回)
  setSkill(null);
  inputEl.value = "";
  if (opts.keepDrawerOpen && historyDrawer.classList.contains("open")) {
    loadSessions();            // 刷新列表里的 active 高亮
  } else {
    closeHistory();
  }
  inputEl.focus();
}
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && historyDrawer.classList.contains("open")) closeHistory();
});

/* 初始 */
fetchSkills();
</script>
